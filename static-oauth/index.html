<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10xGoals</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff4ef',
              100: '#ffe5d5',
              500: '#f05a28',
              600: '#d44d1f',
              700: '#b03f17',
            },
          },
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Google Identity Services (async — app waits for it via _waitForGIS polling) -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <!--
    Script load order matters for Alpine:
    1. config.js  — defines CONFIG global (no defer, instant)
    2. sheets.js  — defines Sheets global (no defer, instant)
    3. app.js     — registers Alpine.data('app') via alpine:init listener (defer)
    4. alpine.js  — fires alpine:init, then processes DOM (defer, AFTER app.js)
    Both app.js and alpine.js use defer so they execute in DOM order after parse.
  -->
  <script src="config.js"></script>
  <script src="sheets.js"></script>
  <script defer src="app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.375rem;
    }

    /* Progress bar transition */
    .progress-bar { transition: width 0.4s ease; }

    /* Subtle left border on KR items */
    .kr-item { border-left: 3px solid #e2e8f0; }
    .kr-item:hover { border-left-color: #f05a28; }
    .kr-item.expanded { border-left-color: #f05a28; }

    /* Confidence badge color scale */
    .conf-low  { background: #fee2e2; color: #991b1b; }
    .conf-mid  { background: #fef9c3; color: #854d0e; }
    .conf-high { background: #dcfce7; color: #166534; }
  </style>
</head>

<body class="h-full bg-slate-50 font-sans text-slate-800 antialiased" x-data="app" x-cloak>

  <!-- ═══════════════════════════════════════════════════════ SIGN-IN VIEW -->
  <div x-show="view === 'signin'" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-brand-50">
    <div class="w-full max-w-sm mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-lg p-10 text-center">
        <!-- Logo / wordmark -->
        <div class="mb-6">
          <span class="text-3xl font-bold text-brand-500 tracking-tight">10x</span><span class="text-3xl font-bold text-slate-800 tracking-tight">Goals</span>
          <p class="text-sm text-slate-500 mt-1">OKR tracker for high-performance teams</p>
        </div>

        <button
          @click="signIn()"
          class="w-full flex items-center justify-center gap-3 px-5 py-3 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 shadow-sm text-sm font-medium text-slate-700 transition"
        >
          <!-- Google G icon -->
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
          <template x-if="CONFIG.ALLOWED_DOMAIN">
            <span class="text-slate-400">(@<span x-text="CONFIG.ALLOWED_DOMAIN"></span>)</span>
          </template>
        </button>

        <p x-show="authError" x-text="authError" class="mt-4 text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2"></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ LOADING VIEW -->
  <div x-show="view === 'loading'" class="min-h-screen flex flex-col items-center justify-center gap-4 text-slate-400">
    <div class="flex gap-1.5">
      <span class="w-2.5 h-2.5 rounded-full bg-brand-500 animate-bounce" style="animation-delay:0s"></span>
      <span class="w-2.5 h-2.5 rounded-full bg-brand-500 animate-bounce" style="animation-delay:.15s"></span>
      <span class="w-2.5 h-2.5 rounded-full bg-brand-500 animate-bounce" style="animation-delay:.3s"></span>
    </div>
    <p class="text-sm">Loading your OKRs…</p>
  </div>

  <!-- ══════════════════════════════════════════════════════════ ERROR VIEW -->
  <div x-show="view === 'error'" class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
      <div class="text-4xl mb-3">⚠️</div>
      <h2 class="font-semibold text-slate-800 mb-2">Setup needed</h2>
      <p class="text-sm text-slate-500 mb-6" x-text="initError?.message || 'Something went wrong.'"></p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button
          x-show="initError?.type === 'NOT_INITIALIZED' || initError?.type === 'SCHEMA_ERROR'"
          @click="initializeSheet()"
          class="px-5 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 transition"
        >Initialize Sheet with sample data</button>
        <button
          @click="refreshData()"
          class="px-5 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-medium hover:bg-slate-50 transition"
        >Try again</button>
        <button
          @click="signOut()"
          class="px-5 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-medium hover:bg-slate-50 transition"
        >Sign out</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ MAIN APP (objectives / detail / alignment) -->
  <div x-show="view === 'objectives' || view === 'detail' || view === 'alignment'" class="min-h-screen flex flex-col">

    <!-- TOP BAR -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-4">

        <!-- Wordmark -->
        <a href="#" @click.prevent="backToList()" class="shrink-0">
          <span class="text-lg font-bold text-brand-500">10x</span><span class="text-lg font-bold text-slate-800">Goals</span>
        </a>

        <!-- Nav tabs -->
        <nav class="hidden sm:flex items-center gap-1 ml-2">
          <button
            @click="view = 'objectives'; selectedObjectiveId = null"
            :class="(view === 'objectives' || view === 'detail') ? 'bg-slate-100 text-slate-800' : 'text-slate-500 hover:text-slate-700'"
            class="px-3 py-1.5 rounded-lg text-sm font-medium transition"
          >Objectives</button>
          <button
            @click="view = 'alignment'"
            :class="view === 'alignment' ? 'bg-slate-100 text-slate-800' : 'text-slate-500 hover:text-slate-700'"
            class="px-3 py-1.5 rounded-lg text-sm font-medium transition"
          >Alignment</button>
        </nav>

        <div class="flex-1"></div>

        <!-- Cycle selector -->
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-400 hidden sm:block">Cycle</label>
          <select
            x-model="selectedCycle"
            class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500"
          >
            <option value="">All cycles</option>
            <template x-for="c in availableCycles" :key="c">
              <option :value="c" x-text="c"></option>
            </template>
          </select>
        </div>

        <!-- Refresh -->
        <button @click="refreshData()" title="Refresh" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>

        <!-- User + sign out -->
        <div class="flex items-center gap-2 text-sm">
          <img x-show="user?.picture" :src="user?.picture" class="w-7 h-7 rounded-full" alt="" />
          <span class="hidden sm:block text-slate-600 font-medium" x-text="user?.name?.split(' ')[0]"></span>
          <button @click="signOut()" class="text-xs text-slate-400 hover:text-slate-600 transition">Sign out</button>
        </div>

      </div>
    </header>

    <!-- ─────────────────────────────────── OBJECTIVES LIST -->
    <main x-show="view === 'objectives'" class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">

      <!-- Toolbar -->
      <div class="flex flex-wrap items-center gap-3 mb-5">
        <!-- Filters -->
        <select x-model="filters.team" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">All teams</option>
          <template x-for="t in filterTeams" :key="t">
            <option :value="t" x-text="t"></option>
          </template>
        </select>
        <select x-model="filters.owner" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">All owners</option>
          <template x-for="o in filterOwners" :key="o.email">
            <option :value="o.email" x-text="o.name"></option>
          </template>
        </select>
        <select x-model="filters.status" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">All statuses</option>
          <option value="on-track">On track</option>
          <option value="at-risk">At risk</option>
          <option value="off-track">Off track</option>
          <option value="done">Done</option>
        </select>
        <button
          x-show="filters.team || filters.owner || filters.status"
          @click="filters = { team: '', owner: '', status: '' }"
          class="text-xs text-slate-400 hover:text-slate-600"
        >Clear filters</button>

        <div class="flex-1"></div>

        <!-- Export -->
        <button
          @click="exportCSV()"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 transition"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Export CSV
        </button>

        <!-- New Objective -->
        <button
          @click="openNewObjectiveModal()"
          class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 transition shadow-sm"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
          New Objective
        </button>
      </div>

      <!-- Empty state -->
      <div x-show="filteredObjectives.length === 0" class="text-center py-20 text-slate-400">
        <div class="text-5xl mb-3">🎯</div>
        <p class="text-sm font-medium">No objectives found</p>
        <p class="text-xs mt-1">
          <span x-show="selectedCycle">for cycle <strong x-text="selectedCycle"></strong> — </span>
          adjust your filters or create a new objective.
        </p>
      </div>

      <!-- Objective cards grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
        <template x-for="obj in filteredObjectives" :key="obj.id">
          <div
            @click="openObjective(obj.id)"
            class="bg-white rounded-xl border border-slate-200 p-5 cursor-pointer hover:shadow-md hover:border-slate-300 transition group"
          >
            <!-- Header row -->
            <div class="flex items-start justify-between gap-2 mb-3">
              <h3 class="font-semibold text-slate-800 text-sm leading-snug group-hover:text-brand-600 transition" x-text="obj.title"></h3>
              <div class="flex flex-col items-end gap-1 shrink-0">
                <span
                  class="text-xs font-medium px-2 py-0.5 rounded-full whitespace-nowrap"
                  :class="statusColor(obj.status)"
                  x-text="obj.status?.replace('-', ' ')"
                ></span>
                <!-- MECE warning -->
                <span
                  x-show="meceWarning(obj)"
                  title="Needs more Key Results to prove this objective"
                  class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full"
                >⚠ KRs needed</span>
              </div>
            </div>

            <!-- Owner & team -->
            <p class="text-xs text-slate-400 mb-3">
              <span x-text="obj.owner_name"></span>
              <span x-show="obj.team"> · <span x-text="obj.team"></span></span>
              <span x-show="obj.cycle"> · <span x-text="obj.cycle"></span></span>
            </p>

            <!-- Progress bar -->
            <div class="mb-1">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs text-slate-400" x-text="objectiveKRs(obj).length + ' KR' + (objectiveKRs(obj).length !== 1 ? 's' : '')"></span>
                <span class="text-xs font-semibold text-slate-600" x-text="Math.round(objectiveProgress(obj)) + '%'"></span>
              </div>
              <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div
                  class="h-full rounded-full progress-bar"
                  :class="progressColor(objectiveProgress(obj))"
                  :style="'width:' + objectiveProgress(obj) + '%'"
                ></div>
              </div>
            </div>

            <!-- Footer -->
            <p class="text-xs text-slate-400 mt-3">
              Updated by <span class="text-slate-500" x-text="obj.updated_by_name?.split(' ')[0] || '—'"></span>
              · <span x-text="relativeTime(obj.updated_at)"></span>
            </p>
          </div>
        </template>
      </div>
    </main>

    <!-- ──────────────────────────────────── OBJECTIVE DETAIL -->
    <main x-show="view === 'detail' && selectedObjective" class="flex-1 max-w-4xl mx-auto w-full px-4 sm:px-6 py-6">

      <!-- Back link -->
      <button @click="backToList()" class="flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-700 mb-5 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
        Back to Objectives
      </button>

      <template x-if="selectedObjective">
        <div>
          <!-- Objective header -->
          <div class="bg-white rounded-xl border border-slate-200 p-6 mb-4">
            <div class="flex items-start gap-4">
              <div class="flex-1 min-w-0">
                <!-- Inline-editable title -->
                <h1
                  contenteditable="true"
                  @blur="updateObjectiveField(selectedObjective, 'title', $event.target.innerText.trim())"
                  @keydown.enter.prevent="$event.target.blur()"
                  class="text-xl font-bold text-slate-800 mb-1 outline-none focus:bg-slate-50 rounded px-1 -ml-1 cursor-text"
                  x-text="selectedObjective.title"
                ></h1>

                <!-- Meta row -->
                <div class="flex flex-wrap items-center gap-3 text-sm text-slate-500 mb-4">
                  <!-- Status -->
                  <select
                    :value="selectedObjective.status"
                    @change="updateObjectiveField(selectedObjective, 'status', $event.target.value)"
                    class="text-xs font-medium px-2 py-0.5 rounded-full border-0 focus:ring-2 focus:ring-brand-500 cursor-pointer"
                    :class="statusColor(selectedObjective.status)"
                  >
                    <option value="on-track">On track</option>
                    <option value="at-risk">At risk</option>
                    <option value="off-track">Off track</option>
                    <option value="done">Done</option>
                  </select>

                  <span>
                    Owner: <span
                      contenteditable="true"
                      @blur="updateObjectiveField(selectedObjective, 'owner_name', $event.target.innerText.trim())"
                      class="font-medium text-slate-700 outline-none focus:bg-slate-50 rounded cursor-text"
                      x-text="selectedObjective.owner_name"
                    ></span>
                  </span>
                  <span x-show="selectedObjective.team">
                    Team: <span
                      contenteditable="true"
                      @blur="updateObjectiveField(selectedObjective, 'team', $event.target.innerText.trim())"
                      class="font-medium text-slate-700 outline-none focus:bg-slate-50 rounded cursor-text"
                      x-text="selectedObjective.team"
                    ></span>
                  </span>
                  <span>Cycle: <span class="font-medium" x-text="selectedObjective.cycle"></span></span>

                  <!-- Parent link -->
                  <template x-if="selectedObjective.parent_objective_id">
                    <span>
                      Aligned to:
                      <button
                        @click="openObjective(selectedObjective.parent_objective_id)"
                        class="font-medium text-brand-600 hover:underline"
                        x-text="objectives.find(o => o.id === selectedObjective.parent_objective_id)?.title || 'Parent'"
                      ></button>
                    </span>
                  </template>
                </div>

                <!-- Description -->
                <p
                  contenteditable="true"
                  @blur="updateObjectiveField(selectedObjective, 'description', $event.target.innerText.trim())"
                  class="text-sm text-slate-500 outline-none focus:bg-slate-50 rounded px-1 -ml-1 cursor-text min-h-[1.5rem]"
                  :class="!selectedObjective.description && 'italic text-slate-300'"
                  x-text="selectedObjective.description || 'Add a description…'"
                ></p>
              </div>

              <!-- Progress ring -->
              <div class="shrink-0 text-center">
                <div class="text-3xl font-bold" :class="objectiveProgress(selectedObjective) >= 70 ? 'text-emerald-600' : objectiveProgress(selectedObjective) >= 40 ? 'text-amber-500' : 'text-rose-500'" x-text="Math.round(objectiveProgress(selectedObjective)) + '%'"></div>
                <div class="text-xs text-slate-400">progress</div>
              </div>
            </div>

            <!-- Audit footer -->
            <p class="text-xs text-slate-400 mt-4 border-t border-slate-100 pt-3">
              Created by <span x-text="selectedObjective.created_by_name"></span> ·
              Last updated by <span x-text="selectedObjective.updated_by_name"></span> · <span x-text="relativeTime(selectedObjective.updated_at)"></span>
            </p>
          </div>

          <!-- Key Results section -->
          <div class="mb-2 flex items-center justify-between">
            <div>
              <h2 class="font-semibold text-slate-700">Key Results</h2>
              <!-- MECE hint -->
              <p x-show="objectiveKRs(selectedObjective).length <= 1" class="text-xs text-amber-600 mt-0.5">
                ⚠ Coverage check — do these KRs, taken together, fully prove the objective is met?
              </p>
            </div>
            <button
              @click="openNewKRModal(selectedObjective.id)"
              class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-brand-500 text-white text-xs font-medium hover:bg-brand-600 transition"
            >
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
              Add KR
            </button>
          </div>

          <!-- KR list -->
          <div class="space-y-2">
            <template x-if="objectiveKRs(selectedObjective).length === 0">
              <div class="bg-white rounded-xl border border-dashed border-slate-300 p-6 text-center text-sm text-slate-400">
                No Key Results yet — add one to start tracking progress.
              </div>
            </template>

            <template x-for="kr in objectiveKRs(selectedObjective)" :key="kr.id">
              <div
                class="bg-white rounded-xl border border-slate-200 overflow-hidden kr-item"
                :class="expandedKRId === kr.id && 'expanded'"
              >
                <!-- KR row (always visible) -->
                <div
                  @click="toggleKR(kr.id)"
                  class="px-5 py-4 cursor-pointer hover:bg-slate-50 transition"
                >
                  <div class="flex items-start justify-between gap-4">
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 mb-2">
                        <h4 class="text-sm font-medium text-slate-700" x-text="kr.title"></h4>
                        <span class="text-xs text-slate-400">wt <span x-text="kr.weight"></span></span>
                        <!-- Latest confidence badge -->
                        <template x-if="latestCheckIn(kr)">
                          <span
                            class="text-xs font-medium px-1.5 py-0.5 rounded"
                            :class="latestCheckIn(kr).confidence >= 7 ? 'conf-high' : latestCheckIn(kr).confidence >= 4 ? 'conf-mid' : 'conf-low'"
                            x-text="'Conf ' + latestCheckIn(kr).confidence"
                          ></span>
                        </template>
                      </div>
                      <!-- Progress bar -->
                      <div class="flex items-center gap-3">
                        <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                          <div
                            class="h-full rounded-full progress-bar"
                            :class="progressColor(krProgress(kr))"
                            :style="'width:' + krProgress(kr) + '%'"
                          ></div>
                        </div>
                        <span class="text-xs font-semibold text-slate-600 w-10 text-right" x-text="Math.round(krProgress(kr)) + '%'"></span>
                      </div>
                    </div>
                    <!-- Current value -->
                    <div class="text-right shrink-0">
                      <div class="text-sm font-semibold text-slate-800" x-text="formatValue(kr, kr.current_value)"></div>
                      <div class="text-xs text-slate-400">of <span x-text="formatValue(kr, kr.target_value)"></span></div>
                    </div>
                  </div>
                </div>

                <!-- Expanded KR detail -->
                <div x-show="expandedKRId === kr.id" x-transition class="border-t border-slate-100 bg-slate-50 px-5 py-4">
                  <div class="flex items-center justify-between mb-3">
                    <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">Check-in history</p>
                    <button
                      @click.stop="openCheckInModal(kr)"
                      class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-brand-500 text-white text-xs font-medium hover:bg-brand-600 transition"
                    >
                      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                      Check in
                    </button>
                  </div>

                  <!-- Check-in list -->
                  <div x-show="krCheckIns(kr).length === 0" class="text-xs text-slate-400 italic py-1">No check-ins yet.</div>
                  <div class="space-y-2">
                    <template x-for="(ci, idx) in krCheckIns(kr).slice(0, 5)" :key="ci.id">
                      <div class="flex items-start gap-3 text-xs">
                        <div class="mt-0.5 w-1.5 h-1.5 rounded-full bg-brand-500 shrink-0"></div>
                        <div class="flex-1">
                          <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-semibold text-slate-700" x-text="formatValue(kr, ci.new_value)"></span>
                            <span
                              class="px-1 py-0.5 rounded text-xs"
                              :class="ci.confidence >= 7 ? 'conf-high' : ci.confidence >= 4 ? 'conf-mid' : 'conf-low'"
                              x-text="'Conf ' + ci.confidence"
                            ></span>
                            <span class="text-slate-400">by <span x-text="ci.checked_in_by_name?.split(' ')[0]"></span> · <span x-text="formatDate(ci.date)"></span></span>
                          </div>
                          <p x-show="ci.note" class="text-slate-500 mt-0.5 italic" x-text="ci.note"></p>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

              </div>
            </template>
          </div>

        </div>
      </template>
    </main>

    <!-- ─────────────────────────────────── ALIGNMENT VIEW -->
    <main x-show="view === 'alignment'" class="flex-1 max-w-4xl mx-auto w-full px-4 sm:px-6 py-6">
      <h2 class="font-semibold text-slate-700 mb-4">Alignment Tree
        <span x-show="selectedCycle" class="text-sm font-normal text-slate-400">— <span x-text="selectedCycle"></span></span>
      </h2>

      <div x-show="alignmentTree.length === 0" class="text-center py-16 text-slate-400 text-sm">
        No objectives to show. Create some objectives and link them with a parent.
      </div>

      <div class="bg-white rounded-xl border border-slate-200 divide-y divide-slate-100 overflow-hidden">
        <template x-for="node in alignmentTree" :key="node.id">
          <div
            @click="openObjective(node.id)"
            class="flex items-center gap-3 px-5 py-3 hover:bg-slate-50 cursor-pointer transition group"
            :style="'padding-left: ' + (20 + node._depth * 28) + 'px'"
          >
            <!-- Depth indicator -->
            <template x-if="node._depth > 0">
              <span class="text-slate-300 text-xs select-none">└</span>
            </template>

            <div class="flex-1 min-w-0">
              <span class="text-sm font-medium text-slate-700 group-hover:text-brand-600 transition" x-text="node.title"></span>
              <span class="text-xs text-slate-400 ml-2" x-text="node.owner_name"></span>
            </div>

            <div class="flex items-center gap-3 shrink-0">
              <!-- Progress -->
              <div class="hidden sm:flex items-center gap-2">
                <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full progress-bar" :class="progressColor(objectiveProgress(node))" :style="'width:' + objectiveProgress(node) + '%'"></div>
                </div>
                <span class="text-xs text-slate-500 w-8" x-text="Math.round(objectiveProgress(node)) + '%'"></span>
              </div>
              <!-- Status -->
              <span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="statusColor(node.status)" x-text="node.status?.replace('-', ' ')"></span>
            </div>
          </div>
        </template>
      </div>
    </main>

  </div><!-- end main app -->

  <!-- ══════════════════════════════════════════════════════ MODALS -->

  <!-- Backdrop -->
  <div
    x-show="modal.type !== null"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click="closeModal()"
    class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-40"
  ></div>

  <!-- Modal panel -->
  <div
    x-show="modal.type !== null"
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    @click.self="closeModal()"
  >
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">

      <!-- ── New Objective modal -->
      <template x-if="modal.type === 'newObjective'">
        <div class="p-6">
          <h2 class="font-semibold text-slate-800 mb-5">New Objective</h2>
          <div class="space-y-4">

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Title *</label>
              <input x-model="modal.data.title" type="text" placeholder="What do you want to achieve?"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Description</label>
              <textarea x-model="modal.data.description" rows="2" placeholder="Why does this matter?"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Owner name *</label>
                <input x-model="modal.data.owner_name" type="text"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Team</label>
                <input x-model="modal.data.team" type="text" :list="'team-list'"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
                <datalist id="team-list">
                  <template x-for="t in filterTeams" :key="t"><option :value="t"></option></template>
                </datalist>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Cycle *</label>
                <input x-model="modal.data.cycle" type="text" list="cycle-list"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
                <datalist id="cycle-list">
                  <template x-for="c in availableCycles" :key="c"><option :value="c"></option></template>
                </datalist>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Status</label>
                <select x-model="modal.data.status" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
                  <option value="on-track">On track</option>
                  <option value="at-risk">At risk</option>
                  <option value="off-track">Off track</option>
                  <option value="done">Done</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Parent objective (optional)</label>
              <select x-model="modal.data.parent_objective_id" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
                <option value="">— None —</option>
                <template x-for="p in parentCandidates(null)" :key="p.id">
                  <option :value="p.id" x-text="p.title"></option>
                </template>
              </select>
            </div>

            <p x-show="modal.error" x-text="modal.error" class="text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2"></p>

            <div class="flex justify-end gap-3 pt-1">
              <button @click="closeModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 transition">Cancel</button>
              <button
                @click="saveNewObjective()"
                :disabled="modal.saving"
                class="px-5 py-2 rounded-xl bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 transition disabled:opacity-50"
              >
                <span x-show="!modal.saving">Create Objective</span>
                <span x-show="modal.saving">Saving…</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- ── New KR modal -->
      <template x-if="modal.type === 'newKR'">
        <div class="p-6">
          <h2 class="font-semibold text-slate-800 mb-5">Add Key Result</h2>
          <div class="space-y-4">

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Title *</label>
              <input x-model="modal.data.title" type="text" placeholder="What will you measure?"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Metric type</label>
                <select x-model="modal.data.metric_type" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500">
                  <option value="number">Number</option>
                  <option value="percentage">Percentage</option>
                  <option value="boolean">Boolean (done/not done)</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Unit <span class="font-normal text-slate-400">(e.g. ₹ Cr, studios, %)</span></label>
                <input x-model="modal.data.unit" type="text" placeholder="optional"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>

            <div x-show="modal.data.metric_type !== 'boolean'" class="grid grid-cols-3 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Start</label>
                <input x-model.number="modal.data.start_value" type="number"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Target</label>
                <input x-model.number="modal.data.target_value" type="number"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Current</label>
                <input x-model.number="modal.data.current_value" type="number"
                  class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">
                Weight <span class="font-normal text-slate-400">(relative importance — higher = more weight on objective progress)</span>
              </label>
              <input x-model.number="modal.data.weight" type="number" min="0.1" step="0.5"
                class="w-32 text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>

            <p x-show="modal.error" x-text="modal.error" class="text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2"></p>

            <div class="flex justify-end gap-3 pt-1">
              <button @click="closeModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 transition">Cancel</button>
              <button
                @click="saveNewKR()"
                :disabled="modal.saving"
                class="px-5 py-2 rounded-xl bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 transition disabled:opacity-50"
              >
                <span x-show="!modal.saving">Add Key Result</span>
                <span x-show="modal.saving">Saving…</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- ── Check-in modal -->
      <template x-if="modal.type === 'checkIn'">
        <div class="p-6">
          <h2 class="font-semibold text-slate-800 mb-1">Check in</h2>
          <p class="text-sm text-slate-500 mb-5" x-text="modal.data.kr?.title"></p>
          <div class="space-y-4">

            <div x-show="modal.data.kr?.metric_type !== 'boolean'">
              <label class="block text-xs font-medium text-slate-600 mb-1">
                New value
                <span x-show="modal.data.kr?.unit" class="font-normal text-slate-400">(<span x-text="modal.data.kr?.unit"></span>)</span>
              </label>
              <input x-model.number="modal.data.new_value" type="number"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>

            <div x-show="modal.data.kr?.metric_type === 'boolean'">
              <label class="block text-xs font-medium text-slate-600 mb-2">Status</label>
              <div class="flex gap-3">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" x-model.number="modal.data.new_value" :value="1" class="accent-brand-500" /> Done ✓
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" x-model.number="modal.data.new_value" :value="0" class="accent-brand-500" /> Not yet
                </label>
              </div>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-2">
                Confidence <span class="font-normal text-slate-400">(1 = very uncertain, 10 = highly confident)</span>
                <span class="ml-2 font-bold" :class="modal.data.confidence >= 7 ? 'text-emerald-600' : modal.data.confidence >= 4 ? 'text-amber-500' : 'text-rose-500'" x-text="modal.data.confidence"></span>
              </label>
              <input x-model.number="modal.data.confidence" type="range" min="1" max="10"
                class="w-full accent-brand-500" />
              <div class="flex justify-between text-xs text-slate-400 mt-0.5"><span>1</span><span>10</span></div>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Date</label>
              <input x-model="modal.data.date" type="date"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Note <span class="font-normal text-slate-400">(optional)</span></label>
              <textarea x-model="modal.data.note" rows="2" placeholder="What's the story behind this number?"
                class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"></textarea>
            </div>

            <p x-show="modal.error" x-text="modal.error" class="text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2"></p>

            <div class="flex justify-end gap-3 pt-1">
              <button @click="closeModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 transition">Cancel</button>
              <button
                @click="saveCheckIn()"
                :disabled="modal.saving"
                class="px-5 py-2 rounded-xl bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 transition disabled:opacity-50"
              >
                <span x-show="!modal.saving">Save Check-in</span>
                <span x-show="modal.saving">Saving…</span>
              </button>
            </div>
          </div>
        </div>
      </template>

    </div><!-- end modal panel -->
  </div><!-- end modal container -->

  <!-- ══════════════════════════════════════════════════════ TOAST -->
  <div
    x-show="toast !== null"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2"
    :class="toast?.kind === 'success' ? 'bg-slate-800 text-white' : 'bg-rose-600 text-white'"
  >
    <span x-show="toast?.kind === 'success'">✓</span>
    <span x-show="toast?.kind === 'error'">⚠</span>
    <span x-text="toast?.msg"></span>
  </div>

</body>
</html>
